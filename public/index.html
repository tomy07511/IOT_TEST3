<body>
  <h1>📊 Monitoreo de Sensores ESP32</h1>

  <div id="charts">
    <div>
      <h2>Temperatura (°C)</h2>
      <canvas id="tempChart"></canvas>
    </div>
    <div>
      <h2>Humedad (%)</h2>
      <canvas id="humChart"></canvas>
    </div>
    <div>
      <h2>pH</h2>
      <canvas id="phChart"></canvas>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const socket = io();

    const tempCtx = document.getElementById('tempChart').getContext('2d');
    const humCtx = document.getElementById('humChart').getContext('2d');
    const phCtx = document.getElementById('phChart').getContext('2d');

    const tempChart = new Chart(tempCtx, {
      type: 'line',
      data: { labels: [], datasets: [{ label: 'Temperatura', data: [], borderColor: 'red', fill: false }] },
      options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });

    const humChart = new Chart(humCtx, {
      type: 'line',
      data: { labels: [], datasets: [{ label: 'Humedad', data: [], borderColor: 'blue', fill: false }] },
      options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });

    const phChart = new Chart(phCtx, {
      type: 'line',
      data: { labels: [], datasets: [{ label: 'pH', data: [], borderColor: 'green', fill: false }] },
      options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });

    socket.on('mqtt_message', (data) => {
      const { temperatura, humedad, ph } = data;
      const time = new Date().toLocaleTimeString();

      if (tempChart.data.labels.length > 10) {
        tempChart.data.labels.shift();
        tempChart.data.datasets[0].data.shift();
        humChart.data.labels.shift();
        humChart.data.datasets[0].data.shift();
        phChart.data.labels.shift();
        phChart.data.datasets[0].data.shift();
      }

      tempChart.data.labels.push(time);
      humChart.data.labels.push(time);
      phChart.data.labels.push(time);

      tempChart.data.datasets[0].data.push(temperatura);
      humChart.data.datasets[0].data.push(humedad);
      phChart.data.datasets[0].data.push(ph);

      tempChart.update();
      humChart.update();
      phChart.update();
    });
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    #charts {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    canvas {
      width: 350px !important;
      height: 250px !important;
      background: #222;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</body>
