<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Sensores ESP32</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #0d1117;
        color: #fff;
        margin: 0;
        padding: 20px;
      }
      h1 {
        color: #00c8ff;
      }
      .chart-container {
        width: 90%;
        max-width: 800px;
        margin: 30px auto;
        background: #161b22;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px #00c8ff55;
      }
      canvas {
        background: #0d1117;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>🌡️ Panel de Sensores ESP32</h1>

    <div class="chart-container">
      <h2>Temperatura (°C)</h2>
      <canvas id="tempChart"></canvas>
    </div>

    <div class="chart-container">
      <h2>Humedad (%)</h2>
      <canvas id="humChart"></canvas>
    </div>

    <div class="chart-container">
      <h2>pH</h2>
      <canvas id="phChart"></canvas>
    </div>

    <script>
      const socket = io();

      const labels = [];
      const tempData = [];
      const humData = [];
      const phData = [];

      // Crear función para generar gráfico
      const createChart = (ctx, label, color, data) => {
        return new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: label,
                data: data,
                borderColor: color,
                backgroundColor: color + "33",
                tension: 0.3,
                fill: true,
              },
            ],
          },
          options: {
            scales: {
              x: { ticks: { color: "#ccc" } },
              y: { ticks: { color: "#ccc" } },
            },
            plugins: {
              legend: { labels: { color: "#fff" } },
            },
          },
        });
      };

      const tempChart = createChart(
        document.getElementById("tempChart"),
        "Temperatura",
        "#ff4d4d",
        tempData
      );
      const humChart = createChart(
        document.getElementById("humChart"),
        "Humedad",
        "#4dd2ff",
        humData
      );
      const phChart = createChart(
        document.getElementById("phChart"),
        "pH",
        "#7fff7f",
        phData
      );

      socket.on("mqtt_message", (data) => {
        const now = new Date().toLocaleTimeString();
        if (labels.length > 10) labels.shift();
        labels.push(now);

        if (tempData.length > 10) tempData.shift();
        if (humData.length > 10) humData.shift();
        if (phData.length > 10) phData.shift();

        tempData.push(data.temperatura);
        humData.push(data.humedad);
        phData.push(data.ph);

        tempChart.update();
        humChart.update();
        phChart.update();
      });
    </script>
  </body>
</html>
